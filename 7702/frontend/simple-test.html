<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIP-7702 后端测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .status {
            padding: 15px;
            border-radius: 6px;
            margin: 10px 0;
            font-family: monospace;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 EIP-7702 后端测试</h1>

        <div>
            <button onclick="testHealth()">检查健康状态</button>
            <button onclick="testApi()">测试 API</button>
            <button onclick="testStatus()">检查委托状态</button>
            <button onclick="testEnable()">启用委托</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3005';

        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = `${new Date().toLocaleTimeString()} - ${message}`;
            document.getElementById('results').appendChild(div);
        }

        async function testHealth() {
            log('🔍 检查健康状态...', 'info');
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                log(`✅ 健康状态: ${JSON.stringify(data)}`, 'success');
            } catch (error) {
                log(`❌ 健康检查失败: ${error.message}`, 'error');
            }
        }

        async function testApi() {
            log('🧪 测试 API...', 'info');
            try {
                const response = await fetch(`${API_BASE}/api/test`);
                const data = await response.json();
                log(`✅ API 测试: ${JSON.stringify(data, null, 2)}`, 'success');
            } catch (error) {
                log(`❌ API 测试失败: ${error.message}`, 'error');
            }
        }

        async function testStatus() {
            const userAddress = '0xc8d1Ae1063176BEBC750D9aD5D057BA4A65daf3d';
            log(`🔍 检查委托状态 (${userAddress})...`, 'info');
            try {
                const response = await fetch(`${API_BASE}/api/eip7702/status`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ userAddress })
                });
                const data = await response.json();
                log(`✅ 委托状态: ${JSON.stringify(data, null, 2)}`, 'success');
            } catch (error) {
                log(`❌ 委托状态检查失败: ${error.message}`, 'error');
            }
        }

        async function testEnable() {
            const userAddress = '0xc8d1Ae1063176BEBC750D9aD5D057BA4A65daf3d';
            log(`🚀 尝试启用委托 (${userAddress})...`, 'info');
            try {
                const response = await fetch(`${API_BASE}/api/eip7702/enable`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        userAddress,
                        dailyLimit: '100000000000000000' // 0.1 ETH
                    })
                });
                const data = await response.json();
                log(`✅ 启用委托: ${JSON.stringify(data, null, 2)}`, 'success');
            } catch (error) {
                log(`❌ 启用委托失败: ${error.message}`, 'error');
            }
        }

        // 页面加载时自动测试
        window.addEventListener('load', () => {
            log('🎯 页面加载完成，开始自动测试...', 'info');
            setTimeout(testHealth, 1000);
        });
    </script>
</body>
</html>
