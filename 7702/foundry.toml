[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts/token/ERC20/IERC20.sol/=lib/openzeppelin-contracts/contracts/token/ERC20/IERC20.sol",
    "@openzeppelin/contracts/token/ERC721/IERC721.sol/=lib/openzeppelin-contracts/contracts/token/ERC721/IERC721.sol"
]

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"
op_sepolia = "${OP_SEPOLIA_RPC_URL}"
op_mainnet = "${OP_MAINNET_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
mainnet = { key = "${ETHERSCAN_API_KEY}" }
op_sepolia = { key = "${ETHERSCAN_API_KEY}" }
op_mainnet = { key = "${ETHERSCAN_API_KEY}" }

# See more config options https://book.getfoundry.sh/reference/config.html